name: Label & comment issues
 
on:
  issues:
    types:
      - opened
      - reopened
      - closed
 
  pull_request:
    types:
      - opened
 
permissions:
  issues: write
  pull-requests: read
  contents: read
 
jobs:
  label_issues:
    if: ${{ github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened') }}
    runs-on: ubuntu-latest
 
    steps:
      - name: Attach label to issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["issue", "fix"]
            });
 
      - name: Comment on new issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thanks for opening this issue! We'll take a look as soon as possible."
            });
 
  comment_closed_issue:
    if: ${{ github.event_name == 'issues' && github.event.action == 'closed' }}
    runs-on: ubuntu-latest
 
    steps:
      - name: Comment when issue is closed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "The issue is now resolved."
            });
 
  comment_first_pull_request:
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'opened' }}
    runs-on: ubuntu-latest
 
    steps:
      - name: Comment on first pull request
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.payload.pull_request.user.login;
            const currentPrNumber = context.payload.pull_request.number;
 
            const allIssuesAndPullRequests = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                creator: username,
                state: "all"
              }
            );
 
            const previousPullRequests = allIssuesAndPullRequests.filter(item => {
              return item.pull_request && item.number !== currentPrNumber;
            });
 
            if (previousPullRequests.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: currentPrNumber,
                body: "Congratulations! Thank you for opening your first pull request."
              });
            } else {
              console.log("This is not the user's first pull request.");
            }
