name: Label & comment issues

on:
  issues:
    types:
      - reopened
      - opened
      - closed
  pull_request:
    types:
      - opened

jobs:
  label_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      # ✅ Attach labels only to issues (not PRs)
      - name: Attach label to issues
        if: github.event_name == 'issues' && github.event.action != 'closed'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["issue", "fix"]
            });

      # ✅ Comment when a new issue is opened
      - name: Comment on new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: peter-evans/create-or-update-comment@v1
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for opening this issue! We'll take a look as soon as possible.

      # ✅ Comment when an issue is closed
      - name: Comment on closed issue
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: peter-evans/create-or-update-comment@v1
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            This issue has been closed. If you think this is incorrect, feel free to reopen it.

      # ✅ Robust first pull request detection (works for ALL users)
      - name: Comment on first pull request
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: actions/github-script@v6
        with:
          script: |
            const creator = context.payload.sender.login;

            const opts = github.rest.issues.listForRepo.endpoint.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator,
              state: 'all'
            });

            const issues = await github.paginate(opts);

            for (const issue of issues) {
              if (issue.number === context.issue.number) continue;

              if (issue.pull_request) {
                return; // User already created a PR before
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🎉 Thanks for your first pull request! We appreciate your contribution."
            });
